<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kids Worksheet Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Codystar:wght@300;400&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4fbff;
        --card: #ffffff;
        --text: #243447;
        --accent: #2d9cdb;
        --accent-dark: #2278a6;
        --border: #d6e8f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Fredoka", system-ui, sans-serif;
        background: linear-gradient(180deg, #ecf8ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1.5rem;
      }

      h1 {
        margin: 0;
      }

      .subtext {
        margin-top: 0.5rem;
        color: #4f6273;
      }

      .trace-panel,
      .assets-panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1rem;
        margin-top: 1rem;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.05);
      }

      .trace-preview {
        border: 2px dashed #c8dceb;
        border-radius: 14px;
        min-height: 120px;
        padding: 1rem;
        margin-top: 0.75rem;
        display: grid;
        place-items: center;
        background: #fbfdff;
      }

      #traceOutput {
        font-family: "Codystar", cursive;
        font-size: clamp(2.4rem, 8vw, 5rem);
        letter-spacing: 0.2em;
        color: #8aa0b2;
        text-transform: uppercase;
        text-align: center;
        margin: 0;
        text-shadow: 0 0 0 #8aa0b2;
      }

      .controls {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      input,
      button {
        font-family: inherit;
      }

      input[type="text"] {
        flex: 1;
        min-width: 220px;
        border: 1px solid #c0d8ea;
        border-radius: 999px;
        padding: 0.7rem 0.9rem;
        font-size: 1rem;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        background: var(--accent);
        color: white;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .assets-grid {
        margin-top: 0.8rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 0.8rem;
      }

      .asset-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.8rem;
        background: #fcfeff;
      }

      .asset-preview {
        width: 100%;
        aspect-ratio: 4 / 3;
        border: 2px dashed #d4e7f4;
        border-radius: 10px;
        display: grid;
        place-items: center;
        margin-bottom: 0.6rem;
        overflow: hidden;
        cursor: pointer;
      }

      .asset-preview svg,
      .asset-preview img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .asset-title {
        margin: 0 0 0.5rem;
        font-size: 1rem;
      }

      .hint {
        margin-top: 0.8rem;
        font-size: 0.9rem;
        color: #5f7384;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Kids Worksheet Builder</h1>
      <p class="subtext">
        Traceable text now uses a Google “railway-dot” style font. Click any shape/image or use its button to download a PDF.
      </p>

      <section class="trace-panel" aria-label="Traceable text settings">
        <div class="controls">
          <input
            id="traceInput"
            type="text"
            value="TRAIN"
            maxlength="16"
            aria-label="Trace text"
            placeholder="Type text to trace"
          />
          <button type="button" id="updateText">Update Trace Text</button>
          <button type="button" id="downloadTracePdf">Download Text PDF</button>
        </div>
        <div class="trace-preview" id="tracePreview">
          <p id="traceOutput">TRAIN</p>
        </div>
      </section>

      <section class="assets-panel" aria-label="Shapes and images">
        <h2>Shapes & Images</h2>
        <div class="assets-grid" id="assetsGrid"></div>
        <p class="hint">Tip: Click any preview area to directly download that item as a PDF.</p>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
      const traceInput = document.getElementById("traceInput");
      const traceOutput = document.getElementById("traceOutput");
      const updateTextButton = document.getElementById("updateText");
      const downloadTracePdfButton = document.getElementById("downloadTracePdf");
      const assetsGrid = document.getElementById("assetsGrid");

      const assets = [
        {
          id: "circle",
          title: "Circle Shape",
          type: "shape",
          svg: `<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg"><circle cx="150" cy="110" r="70" fill="#93d8ff" stroke="#2d9cdb" stroke-width="6"/></svg>`
        },
        {
          id: "triangle",
          title: "Triangle Shape",
          type: "shape",
          svg: `<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg"><polygon points="150,35 250,190 50,190" fill="#f7bf5e" stroke="#e18d07" stroke-width="6"/></svg>`
        },
        {
          id: "star",
          title: "Star Shape",
          type: "shape",
          svg: `<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg"><polygon points="150,25 180,95 255,95 195,140 220,205 150,163 80,205 105,140 45,95 120,95" fill="#ffd56f" stroke="#e9a10f" stroke-width="6"/></svg>`
        },
        {
          id: "train-image",
          title: "Train Image",
          type: "image",
          image: "https://images.unsplash.com/photo-1474487548417-781cb71495f3?auto=format&fit=crop&w=800&q=60"
        },
        {
          id: "balloons-image",
          title: "Balloons Image",
          type: "image",
          image: "https://images.unsplash.com/photo-1527529482837-4698179dc6ce?auto=format&fit=crop&w=800&q=60"
        }
      ];

      updateTextButton.addEventListener("click", () => {
        traceOutput.textContent = (traceInput.value || "TRAIN").toUpperCase();
      });

      traceInput.addEventListener("input", () => {
        traceOutput.textContent = (traceInput.value || "TRAIN").toUpperCase();
      });

      downloadTracePdfButton.addEventListener("click", () => {
        const text = (traceInput.value || "TRAIN").toUpperCase();
        downloadTextPdf(text);
      });

      function createAssetCard(asset) {
        const card = document.createElement("article");
        card.className = "asset-card";

        const title = document.createElement("h3");
        title.className = "asset-title";
        title.textContent = asset.title;

        const preview = document.createElement("div");
        preview.className = "asset-preview";
        preview.setAttribute("role", "button");
        preview.setAttribute("tabindex", "0");
        preview.setAttribute("aria-label", `Download ${asset.title} as PDF`);

        if (asset.type === "shape") {
          preview.innerHTML = asset.svg;
        } else {
          const img = document.createElement("img");
          img.src = asset.image;
          img.alt = asset.title;
          img.crossOrigin = "anonymous";
          preview.appendChild(img);
        }

        const button = document.createElement("button");
        button.type = "button";
        button.textContent = "Download PDF";

        const triggerDownload = () => downloadAssetPdf(asset, preview);

        button.addEventListener("click", triggerDownload);
        preview.addEventListener("click", triggerDownload);
        preview.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            triggerDownload();
          }
        });

        card.append(title, preview, button);
        assetsGrid.appendChild(card);
      }

      function downloadTextPdf(text) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: "landscape", unit: "pt", format: "a4" });
        doc.setFont("courier", "normal");
        doc.setFontSize(72);
        doc.setTextColor(135, 157, 175);
        doc.text(text, 60, 220, { maxWidth: 760 });
        doc.save(`${text.toLowerCase()}-trace.pdf`);
      }

      function downloadAssetPdf(asset, previewNode) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: "portrait", unit: "pt", format: "a4" });
        doc.setFont("helvetica", "bold");
        doc.setFontSize(20);
        doc.text(asset.title, 40, 50);

        if (asset.type === "shape") {
          const svgElement = previewNode.querySelector("svg");
          const serialized = new XMLSerializer().serializeToString(svgElement);
          const svgDataUrl = `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(serialized)))}`;
          doc.addImage(svgDataUrl, "PNG", 40, 80, 520, 360);
        } else {
          const imageElement = previewNode.querySelector("img");
          doc.addImage(imageElement, "JPEG", 40, 80, 520, 360);
        }

        doc.save(`${asset.id}.pdf`);
      }

      assets.forEach(createAssetCard);
    </script>
  </body>
</html>
